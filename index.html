<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>得布der布</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
            background: #f5f7fb;
            color: #1f2d3d;
            line-height: 1.5;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
        }
        .avatar {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #764ba2;
        }
        .name {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .bio {
            font-size: 1rem;
            opacity: 0.9;
            max-width: 500px;
            margin: 0 auto;
        }
        .content {
            padding: 2rem;
        }
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            border-left: 5px solid #667eea;
            padding-left: 1rem;
        }
        .download-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.2rem;
            margin-bottom: 2rem;
        }
        .download-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 1.2rem;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #e2e8f0;
        }
        .download-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -12px rgba(0,0,0,0.15);
        }
        .file-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .file-name {
            font-weight: 600;
            word-break: break-all;
            margin-bottom: 0.5rem;
        }
        .file-size {
            font-size: 0.8rem;
            color: #475569;
            margin-bottom: 1rem;
        }
        .download-btn {
            display: inline-block;
            background: #667eea;
            color: white;
            text-decoration: none;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }
        .download-btn:hover {
            background: #5a67d8;
        }
        .info-text {
            background: #eef2ff;
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #1e3a8a;
        }
        footer {
            text-align: center;
            padding: 1.5rem;
            border-top: 1px solid #e2e8f0;
            color: #64748b;
            font-size: 0.85rem;
        }
        @media (max-width: 640px) {
            .header { padding: 2rem 1rem; }
            .content { padding: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="avatar">📁</div>
        <div class="name">derb</div>
        <div class="bio">1</div>
    </div>
    <div class="content">
        <div class="section-title">文件下载</div>
        <div class="download-grid">
            <!-- 每个下载卡片，href 指向 downloads 文件夹下的文件 -->
            <div class="download-card">
                <div class="file-icon">📄</div>
                <div class="file-name">fenxibozikao.pdf</div>
                <div class="file-size">约 1 MB</div>
                <a href="downloads/fenxibozikao.pdf" class="download-btn" download>⬇️ 下载文件</a>
            </div>
        </div>
        <div class="info-text">
            💡 提示：
        </div>
    </div>
</div>
</body>
</html>
